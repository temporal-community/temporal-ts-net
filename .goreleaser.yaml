# yaml-language-server: $schema=https://goreleaser.com/static/schema.json
version: 2

before:
  hooks:
    - go mod tidy

builds:
  - id: temporal-ts_net
    binary: temporal-ts_net
    main: ./cmd/temporal-ts_net
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
      - -X main.version={{.Version}}
      - -X main.commit={{.Commit}}
      - -X main.date={{.Date}}

archives:
  - id: temporal-ts_net
    name_template: >-
      {{ .ProjectName }}_
      {{- .Version }}_
      {{- title .Os }}_
      {{- if eq .Arch "amd64" }}x86_64
      {{- else if eq .Arch "386" }}i386
      {{- else }}{{ .Arch }}{{ end }}
      {{- if .Arm }}v{{ .Arm }}{{ end }}
    files:
      - README.md
      - LICENSE

checksum:
  name_template: 'checksums.txt'

snapshot:
  version_template: "{{ incpatch .Version }}-next"

changelog:
  sort: asc
  filters:
    exclude:
      - '^docs:'
      - '^test:'
      - '^chore:'
      - '^ci:'
      - Merge pull request
      - Merge branch

release:
  github:
    owner: chaptersix
    name: temporal-start-dev-ext
  draft: false
  prerelease: auto
  mode: replace
  header: |
    ## temporal-ts-net {{.Tag}} ({{.Date}})

    Temporal CLI extension for exposing dev servers on Tailscale networks.

  footer: |
    **Full Changelog**: https://github.com/chaptersix/temporal-start-dev-ext/compare/{{ .PreviousTag }}...{{ .Tag }}
